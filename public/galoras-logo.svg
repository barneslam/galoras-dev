<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 205" role="img" aria-label="Galoras logo">
  <defs>
    <style>
      .blue-stroke { stroke: #5FB5F5; fill: none; }
      .blue        { fill: #5FB5F5; }
      .dark        { fill: #0A1628; }
    </style>
  </defs>

  <g transform="translate(20, 20)">
    <!-- Bolt outline (left) -->
    <path d="M70 0 L35 65 H70 L45 130 L120 55 H85 L110 0 Z"
          class="blue-stroke" stroke-width="10"
          stroke-linejoin="round" stroke-linecap="round"/>

    <!-- Blue square + dark G (right of bolt, gap of 30px from bolt) -->
    <rect x="150" y="5" width="120" height="120" rx="6" class="blue"/>
    <text x="210" y="73" text-anchor="middle" dominant-baseline="middle"
          class="dark" font-family="Poppins, Arial, sans-serif"
          font-size="78" font-weight="800">G</text>

    <!-- Wordmark centred under both marks (midpoint of x=35..270 = 152) -->
    <text x="152" y="158"
          text-anchor="middle"
          fill="#5FB5F5"
          font-family="Poppins, Arial, sans-serif"
          font-size="22"
          font-weight="600"
          letter-spacing="8">GALORAS</text>
  </g>
</svg>
